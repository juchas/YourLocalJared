name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest psutil httpx python-dotenv
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Ruff
        run: ruff check ylj/ tests/

      - name: Pytest
        run: pytest -v
