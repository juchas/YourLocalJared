name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: lint + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install CPU torch first so pyproject's torch requirement is
          # satisfied without pulling the huge GPU wheels from PyPI.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Editable install of the full project so CI catches any drift
          # in pyproject.toml (missing runtime deps, etc.).
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check ylj/ tests/

      - name: Pytest
        run: pytest -v
