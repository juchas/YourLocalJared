name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `model:` pin — fall back to the action's default Sonnet.
          # Opus 4.7 isn't in the action's catalog yet; re-pin once it is.
          prompt: |
            When asked to review a pull request, post a formal GitHub
            pull-request review with an explicit event
            (APPROVE / REQUEST_CHANGES / COMMENT) and line-level inline
            comments where appropriate — not a plain issue comment.

            For any other request (fix X, answer a question, run a task),
            respond however makes sense.
