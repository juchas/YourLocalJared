name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `model:` pin — fall back to the action's default (latest
          # Sonnet). Pinning to `claude-opus-4-7` caused the action to
          # fail silently (eyes reaction, no response) because the ID
          # wasn't recognised by the action's model catalog at the time.
          # Re-add once Opus 4.7 is officially supported.
          prompt: |
            When the user asks you to review a pull request (e.g. "@claude
            review this PR"), submit a formal GitHub review using the
            pull_request_review_write tool with `method: create` and an
            explicit `event` of APPROVE, REQUEST_CHANGES, or COMMENT — do
            not just post a plain issue comment.

            Include inline comments on specific lines when flagging issues
            so the review lands in the PR's Reviews section and shows the
            standard GitHub review state (approved / changes requested /
            commented), not a loose comment in the conversation thread.

            For other mentions (fix X, answer a question, run a task),
            continue to respond however makes sense for the request.
