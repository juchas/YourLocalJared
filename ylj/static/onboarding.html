  :root {
    /* Light YourJared palette */
    --bg: #ffffff;

  /* Dark theme — same var names, different values */
  html[data-theme="dark"] {
    --bg: #0b0b0d;
    --bg-alt: #141418;
    --bg-hi: #1c1c22;
    --border: #26262d;
    --border-hi: #34343c;
    --text: #e8e8ec;
    --text-dim: #a1a1a9;
    --text-dimmer: #6e6e78;
    --text-faintest: #3a3a42;
    --ok: #22d672;
    --warn: #ff6d54;
    --info: #60a5fa;
  }
  html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #34343c; }
  html[data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #4a4a54; }
  /* Font-size presets — drive the body font-size so child px/em tokens shift together */
  html[data-font="compact"] body      { font-size: 11px; }
  html[data-font="default"] body      { font-size: 12px; }
  html[data-font="comfortable"] body  { font-size: 14px; }
  /* Reduced motion — near-instant so layout still settles */
  html[data-motion="reduced"] *,
  html[data-motion="reduced"] *::before,
  html[data-motion="reduced"] *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    font-family: var(--mono);
    color: var(--text);
    overflow: hidden;
    font-size: 12px;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; border: none; background: none; padding: 0; }
  input[type="text"] { outline: none; }
  code { font-family: var(--mono); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes slideIn { from { transform: translateX(-4px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
